<!DOCTYPE html>

<head>

<title>Cosbots - Comic</title>

<link rel="stylesheet" href="assets/css/styles.css">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-92H1H7WB5W"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-92H1H7WB5W');

<body>

<!-- Contador -->
<div class="counter">
    <span id="visits">0</span> lectores
</div>

<!-- Comic -->
<div class="comic-container" id="comic"></div>

<!-- Script del contador -->
<script>
fetch('https://api.counterapi.dev/vmms/cosbots')
  .then(res => res.json())
  .then(data => {
    document.getElementById('visits').innerText = data.count;
  });
</script>

<script src="assets/js/comic.js"></script>
