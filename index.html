<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Cómic</title>

<style>
body {
    margin: 0;
    padding: 0;
    background-color: #111; /* fondo oscuro tipo lector */
    font-family: Arial, sans-serif;
    text-align: center;
}

header {
    padding: 20px;
    color: white;
    font-size: 28px;
    letter-spacing: 2px;
    border-bottom: 2px solid #333;
}

.comic-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 0;
}

.page {
    margin-bottom: 80px; /* separación entre páginas */
}

.page img {
    max-width: 90%;
    height: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    border-radius: 6px;
}
</style>
</head>

<body>

<header>MI CÓMIC</header>

<div class="comic-container">

    <!-- Página 1 -->
    <div class="page">
        <img src="pagina1.jpg" alt="Página 1">
    </div>

    <!-- Página 2 -->
    <div class="page">
        <img src="pagina2.jpg" alt="Página 2">
    </div>

    <!-- Página 3 -->
    <div class="page">
        <img src="pagina3.jpg" alt="Página 3">
    </div>

</div>

</body>
</html>
